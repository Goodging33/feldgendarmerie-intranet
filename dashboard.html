<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard – Feldgendarmerie</title>
  <style>
    :root {
      --bg: #0a0c0f;
      --panel: #111418;
      --panel-light: #161a1f;
      --accent: #ff7a1a;
      --accent-glow: rgba(255, 122, 26, 0.55);
      --text-main: #f2f2f2;
      --text-soft: #b5b5b5;
      --border: #1c1f24;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
    background: var(--bg);
    color: var(--text-main);
    height: 100vh;
    display: flex;
    overflow: hidden;
    position: relative;
    }

    body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 10%, var(--accent-glow), transparent 70%);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 22px 18px;
      gap: 20px;
      box-shadow: 4px 0 20px rgba(0,0,0,0.4);
    }

    .sidebar-title {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .sidebar-sub {
      font-size: 11px;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .nav-btn {
      width: 100%;
      padding: 10px 12px;
      background: var(--panel-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: 0.2s ease;
      letter-spacing: 0.04em;
    }

    .nav-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      transform: translateX(3px);
    }

    .logout {
      margin-top: auto;
      background: #2a0f0f;
      border-color: #4a1a1a;
    }

    .logout:hover {
      border-color: #ff4a4a;
      box-shadow: 0 0 8px rgba(255, 70, 70, 0.5);
    }

    /* MAIN AREA */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0c0e11;
    }

    /* HEADER */
    .header {
      padding: 20px 26px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
    }

    .header-status {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-soft);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .player-name {
      margin-top: 4px;
      font-size: 13px;
      color: var(--text-main);
      opacity: 0.9;
      letter-spacing: 0.06em;
    }

    /* CONTENT */
    .content {
      padding: 26px;
      overflow-y: auto;
      color: var(--text-soft);
      font-size: 14px;
    }

    .placeholder-box {
      background: var(--panel-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      color: var(--text-soft);
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .nav-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      color: var(--accent);
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="sidebar-title">Feldgendarmerie</div>
      <div class="sidebar-sub">Interface Opérationnelle</div>
    </div>

    <nav class="nav">
      <button class="nav-btn">Accueil</button>
      <br>
      <button class="nav-btn">Créer un Rapport</button>
      <button class="nav-btn">Prise de Service</button>
      <br>
      <button class="nav-btn">Casier Judiciaire</button>
      <button class="nav-btn">Documentation Interne</button>
      <button class="nav-btn">Cellule de Formation</button>
      <button class="nav-btn">Organigrame</button>
      <button class="nav-btn">Autre Rapport</button>
      <button class="nav-btn">Panel DAA</button>
      <button class="nav-btn">Panel DGJI</button>
      <button class="nav-btn">Agenda</button>
    </nav>

    <button class="nav-btn logout">Se déconnecter</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <header class="header">
      <div class="header-top">
        <div class="header-title">BASE FELDGENDARMERIE</div>

        <div class="header-status">
          <span class="status-dot"></span>
          <span>Accès autorisé</span>
        </div>
      </div>

      <div class="player-name">
        Utilisateur connecté : <strong>[Nom du joueur]</strong>
      </div>
    </header>

    <!-- CONTENT -->
    <section class="content">
      <div class="placeholder-box">
        Tableau de bord opérationnel.<br>
        Les modules seront intégrés ici plus tard.
      </div>
    </section>

  </main>
</body>
  <script src="notifications.js"></script>
  <script src="rapport.js"></script>
  <script src="casier.js"></script>
  <script src="formation.js"></script>
  <script src="organigramme.js"></script>
  <script src="autrerapport.js"></script>
  <script src="debrief.js"></script>
  <script src="service.js"></script>
  <script src="panel-daa.js"></script>
  <script src="panel-dgji.js"></script>
  <script src="agenda.js"></script>
  <script src="dashboard.js"></script>
</html>
