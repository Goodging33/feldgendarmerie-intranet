<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🟠 - Intranet Feldgendarmerie</title>
    <style>
        body {
            background-color: rgb(37, 37, 37);
            text-align: center;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
            padding: 20px;
        }
        h1 {
            color: rgb(245, 147, 20)
        }
        h4 {
            color: rgb(226, 226, 226)
        }
        h3 {
            color: rgb(47, 117, 47)
        }
        h2 {
            color: rgb(245, 147, 20);
            margin-top: 30px;
            margin-bottom: 15px;
        }
        footer {
            background-color: rgb(53, 53, 53);
            color: white;
            text-align: center;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        nav {
            background-color: rgb(53, 53, 53);
            padding: 15px 0;
            top: 0;
            width: 100%;
        }
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        nav ul li {
            display: inline;
        }
        nav button {
            background-color: transparent;
            color: rgb(200, 120, 15);
            border: 2px solid rgb(200, 120, 15);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        nav button:hover {
            background-color: rgb(200, 120, 15); 
            color: #333;
        }

        /* Styles pour les catégories */
        .category-section {
            background-color: rgb(53, 53, 53);
            border: 3px solid black;
            padding: 20px;
            margin: 20px auto;
            max-width: 1400px;
            border-radius: 8px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .category-title {
            font-size: 22px;
            font-weight: bold;
        }

        .category-count {
            background-color: rgb(245, 147, 20);
            color: rgb(37, 37, 37);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* Styles pour les rapports */
        .rapport-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .rapport-card {
            background-color: rgb(37, 37, 37);
            border: 2px solid rgb(245, 147, 20);
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .rapport-card:hover {
            background-color: rgb(43, 43, 43);
        }

        .rapport-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .rapport-id {
            font-size: 12px;
            color: rgb(158, 158, 158);
            font-family: monospace;
        }

        .rapport-date {
            font-size: 11px;
            color: rgb(158, 158, 158);
        }

        .rapport-info {
            margin: 8px 0;
        }

        .rapport-label {
            color: rgb(245, 147, 20);
            font-weight: bold;
            font-size: 12px;
            display: block;
            margin-bottom: 3px;
        }

        .rapport-value {
            color: rgb(226, 226, 226);
            font-size: 14px;
        }

        .rapport-contenu {
            margin-top: 10px;
            padding: 10px;
            background-color: rgb(53, 53, 53);
            border-radius: 4px;
            font-size: 13px;
            color: rgb(226, 226, 226);
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .statut-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 10px;
        }

        .statut-en-attente {
            background-color: rgb(255, 193, 7);
            color: rgb(37, 37, 37);
        }

        .statut-traite-daa {
            background-color: rgb(33, 150, 243);
            color: white;
        }

        .statut-dgji {
            background-color: rgb(156, 39, 176);
            color: white;
        }

        .statut-termine {
            background-color: rgb(76, 175, 80);
            color: white;
        }

        .no-rapports {
            text-align: center;
            color: rgb(158, 158, 158);
            padding: 30px;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: rgb(245, 147, 20);
            padding: 30px;
            font-size: 18px;
        }

        /* Bouton pour nouveau rapport */
        .btn-nouveau-rapport {
            background-color: rgb(245, 147, 20);
            color: rgb(37, 37, 37);
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            width: auto;
            transition: background-color 0.3s;
        }

        .btn-nouveau-rapport:hover {
            background-color: rgb(200, 120, 15);
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <div class="user-info" style="color: rgb(226, 226, 226);">
                <p style="text-align: left;">Connecté en tant que : <br><span class="email" id="userEmail">Chargement...</span></p>
            </div>
            <li><button onclick="window.location.href='dashboard.html'">Accueil</button></li>

            <li><button onclick="window.location.href='documentation.html'">Document</button></li>
            <li><button onclick="window.location.href='formation.html'">Formation</button></li>
            <li><button onclick="window.location.href='agenda.html'">Agenda</button></li>
            <li><button onclick="window.seDeconnecter()">Se déconnecter</button></li>
        </ul>
    </nav>
    <main>

        <div class="category-section">

        <!-- CATÉGORIE 3 : Pris par D.G.J.I -->
        <div class="category-section">

        </div>

        <!-- CATÉGORIE 4 : Terminé -->

            <div class="category-header">
                <h2 class="category-title">✅ Terminé</h2>

            </div>
        </div>

    </main>
    <footer>
        <br>
        <h4>2026 - Fait par goodging33_dev / STUGART Alphons.</h4>
        <br>
    </footer>

</body>
